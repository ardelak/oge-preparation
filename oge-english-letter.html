<head>
<meta charset="UTF-8">

<title>ОГЭ Английский — Тренажёр «Письмо»</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --border: #e0e0e4;
  --text: #1d1d1f;
  --muted: #86868b;
  --accent: #2D6AE0;
  --green: #22a355;
  --orange: #e68a00;
  --red: #d93636;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
button { font-family: inherit; cursor: pointer; }
button:hover { opacity: 0.88; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #c5c5ca; border-radius: 3px; }

.header {
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); flex-wrap: wrap; gap: 12px;
}
.header-title h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.header-title p { font-size: 12px; color: var(--muted); font-weight: 500; }
.mode-tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 3px; }
.mode-tab {
  padding: 8px 14px; border: none; border-radius: 8px;
  font-size: 12px; font-weight: 700; white-space: nowrap;
  background: transparent; color: var(--muted); transition: all 0.2s;
}
.mode-tab.active { color: #fff; background: var(--accent); }

.layout { display: flex; }
.sidebar {
  width: 230px; border-right: 1px solid var(--border); padding: 16px 12px;
  background: var(--surface); min-height: calc(100vh - 65px); flex-shrink: 0;
  overflow-y: auto;
}
.sidebar-label {
  font-size: 10px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 12px 8px;
}
.topic-btn {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 11px 14px; border: none; border-radius: 10px;
  margin-bottom: 3px; text-align: left; transition: all 0.15s;
  background: transparent; border-left: 3px solid transparent;
}
.topic-btn .icon { font-size: 18px; flex-shrink: 0; }
.topic-btn .label { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; }
.topic-btn.active { background: #2D6AE015; border-left-color: var(--accent); }
.topic-btn.active .label { font-weight: 700; color: var(--accent); }

.info-box {
  margin-top: 16px; padding: 14px; background: var(--bg); border-radius: 12px;
}
.info-box .title { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 1px; }
.info-box .body { font-size: 12px; color: var(--text); line-height: 1.7; }

.main { flex: 1; padding: 24px 32px; max-width: 860px; min-height: calc(100vh - 65px); }
.content-header h2 {
  font-size: 22px; font-weight: 800; color: var(--accent);
  display: flex; align-items: center; gap: 10px;
}
.content-header p { margin-top: 4px; font-size: 13px; color: var(--muted); margin-bottom: 20px; }

/* Accordion sections */
.acc-section { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--surface); margin-bottom: 10px; }
.acc-header {
  width: 100%; padding: 14px 20px; background: none; border: none;
  display: flex; justify-content: space-between; align-items: center; text-align: left;
}
.acc-header .title { font-size: 14px; font-weight: 700; color: var(--text); }
.acc-toggle { font-size: 18px; font-weight: 700; color: var(--accent); transition: transform 0.2s; }
.acc-body { padding: 4px 20px 18px; }

/* Template cards */
.tpl-card {
  background: var(--bg); border-radius: 10px; padding: 14px 18px; margin-bottom: 10px;
  border-left: 3px solid var(--accent);
}
.tpl-en { font-size: 14px; font-weight: 600; line-height: 1.6; color: var(--text); margin-bottom: 4px; }
.tpl-ru { font-size: 13px; color: var(--muted); line-height: 1.5; font-style: italic; }

/* Phrase grid */
.phrase-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
.phrase-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 18px; border-top: 3px solid var(--accent);
}
.phrase-card h4 { font-size: 13px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.phrase-item { margin-bottom: 6px; }
.phrase-item .en { font-size: 13px; font-weight: 600; color: var(--text); }
.phrase-item .ru { font-size: 12px; color: var(--muted); }

/* Topic keywords */
.kw-section { margin-bottom: 16px; }
.kw-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.kw-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; }
.kw-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 16px;
}
.kw-card h5 { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; }
.kw-item { font-size: 13px; line-height: 1.6; margin-bottom: 4px; }
.kw-item .en { font-weight: 600; }
.kw-item .ru { color: var(--muted); font-size: 12px; }

/* Practice area */
.practice-container { display: flex; flex-direction: column; gap: 16px; }
.prompt-card {
  background: var(--surface); border: 2px solid var(--accent); border-radius: 14px;
  padding: 20px 24px;
}
.prompt-card .label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.prompt-card .text { font-size: 14px; line-height: 1.7; }
.prompt-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.prompt-btn {
  padding: 8px 16px; border-radius: 8px; border: 1.5px solid var(--accent);
  background: transparent; color: var(--accent); font-size: 12px; font-weight: 600;
}
.prompt-btn.filled { background: var(--accent); color: #fff; border-color: var(--accent); }

.editor-area {
  position: relative; background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
}
.editor-area textarea {
  width: 100%; min-height: 320px; padding: 20px 24px; border: none; outline: none;
  font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.8;
  color: var(--text); background: transparent; resize: vertical;
}
.editor-area textarea::placeholder { color: #bbb; }

.word-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px; border-top: 1px solid var(--border); background: var(--bg);
}
.word-count-num { font-size: 28px; font-weight: 800; }
.word-label { font-size: 12px; color: var(--muted); }
.word-indicator {
  padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 700;
  display: flex; align-items: center; gap: 6px;
}
.word-meter { width: 200px; height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; }
.word-meter-fill { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; }

/* Structure guide */
.structure-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 20px 24px; margin-bottom: 12px;
}
.structure-card .step-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%; background: var(--accent);
  color: #fff; font-size: 13px; font-weight: 800; margin-right: 10px;
}
.structure-card .step-title { font-size: 15px; font-weight: 700; display: inline; }
.structure-card .step-body { margin-top: 8px; font-size: 14px; line-height: 1.7; color: var(--text); }
.structure-card .step-example { margin-top: 8px; padding: 12px 16px; background: var(--bg); border-radius: 10px; border-left: 3px solid var(--accent); }
.structure-card .step-example .en { font-size: 13px; font-weight: 600; line-height: 1.6; }
.structure-card .step-example .ru { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 2px; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .sidebar.open { display: block; position: fixed; z-index: 100; top: 0; left: 0; height: 100vh; width: 260px; }
  .main { padding: 16px; }
  .mode-tabs { flex-wrap: wrap; }
  .mobile-toggle { display: block !important; }
  .phrase-grid, .kw-grid { grid-template-columns: 1fr; }
}
</style>
</head>

// WORD COUNT LOGIC
// ═══════════════════════════════════════════════════════════════
function countWords(text) {
  return text.trim().split(/\s+/).filter(w => w.length > 0).length;
}
function getWordStatus(count) {
  if (count === 0) return { label: "Пусто", color: "var(--muted)", emoji: "⬜", pct: 0 };
  if (count < 80) return { label: "Мало (менее 80)", color: "var(--red)", emoji: "🔴", pct: (count/120)*100 };
  if (count < 100) return { label: "Недостаточно (80–99)", color: "var(--orange)", emoji: "🟠", pct: (count/120)*100 };
  if (count <= 120) return { label: "Оптимально! (100–120)", color: "var(--green)", emoji: "🟢", pct: (count/120)*100 };
  if (count <= 132) return { label: "Допустимо (121–132)", color: "var(--orange)", emoji: "🟡", pct: 100 };
  return { label: "Слишком много! (>132)", color: "var(--red)", emoji: "🔴", pct: 100 };
}

function renderModeTabs() {
  const el = document.getElementById("modeTabs");
  el.innerHTML = MODES.map(m =>
    `<button class="mode-tab ${currentMode === m.id ? 'active' : ''}" data-mode="${m.id}">${m.icon} ${m.name}</button>`
  ).join("");
  el.querySelectorAll("button").forEach(btn => btn.addEventListener("click", () => {
    currentMode = btn.dataset.mode;
    resetExpanded();
    render();
  }));
}

      document.querySelector('.sidebar').classList.remove('open');
    }));
  } else {
    el.querySelectorAll(".topic-btn").forEach(btn => btn.addEventListener("click", () => {
      currentSidebarTopic = btn.dataset.topic;
      render();
      document.querySelector('.sidebar').classList.remove('open');
    }));
  }
}

function renderHeader() {
  const descs = {
    structure: "Пошаговая структура личного письма с примерами на каждый элемент.",
    templates: "Готовые фразы-шаблоны для каждой части письма с переводом.",
    topics: "Ключевые слова и фразы по самым частым темам экзамена.",
    practice: "Напиши письмо и отслеживай количество слов в реальном времени.",
  };
  const icons = { structure: "📐", templates: "📝", topics: "💬", practice: "✍️" };
  const titles = { structure: "Структура письма", templates: "Шаблоны фраз", topics: "Темы и ключевые фразы", practice: "Тренажёр письма" };

  document.getElementById("contentHeader").innerHTML = `
    <h2>${icons[currentMode]} ${titles[currentMode]}</h2>
    <p>${descs[currentMode]}</p>
  `;
}

function renderContent() {
  const el = document.getElementById("content");
  switch (currentMode) {
    case "structure": return renderStructure(el);
    case "templates": return renderTemplates(el);
    case "topics": return renderTopics(el);
    case "practice": return renderPractice(el);
  }
}

function renderStructure(el) {
  el.innerHTML = STRUCTURE.map(step => `
    <div class="structure-card">
      <span class="step-num">${step.num}</span>
      <span class="step-title">${step.title}</span>
      <div class="step-body">${step.body}</div>
      ${step.examples.map(ex => `
        <div class="step-example">
          <div class="en">${ex.en.replace(/\n/g, '<br>')}</div>
          <div class="ru">${ex.ru.replace(/\n/g, '<br>')}</div>
        </div>
      `).join("")}
    </div>
  `).join("");
}

function renderTemplates(el) {
  const sections = Object.entries(TEMPLATES);
  el.innerHTML = sections.map(([key, sec], idx) => {
    const isOpen = expandedSections[key] !== false;
    return `
      <div class="acc-section">
        <button class="acc-header" data-key="${key}">
          <span class="title">${sec.title}</span>
          <span class="acc-toggle" style="transform:rotate(${isOpen ? 45 : 0}deg)">+</span>
        </button>
        ${isOpen ? `<div class="acc-body">
          ${sec.items.map(item => `
            <div class="tpl-card">
              <div class="tpl-en">${item.en}</div>
              <div class="tpl-ru">${item.ru}</div>
            </div>
          `).join("")}
        </div>` : ""}
      </div>
    `;
  }).join("");
  // default open
  sections.forEach(([key]) => { if (expandedSections[key] === undefined) expandedSections[key] = true; });
  el.querySelectorAll(".acc-header").forEach(btn => btn.addEventListener("click", () => {
    const key = btn.dataset.key;
    expandedSections[key] = !expandedSections[key];
    renderContent();
  }));
}

function renderTopics(el) {
  const data = TOPIC_DATA[currentSidebarTopic];
  if (!data) return;
  el.innerHTML = `
    <div class="kw-section">
      <div class="kw-title">${data.icon} ${data.name}</div>

      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:16px">
        <div style="font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Пример вопросов из задания</div>
        <div style="font-size:14px;line-height:1.7;font-style:italic">${data.sample_q}</div>
        <div style="font-size:13px;line-height:1.6;color:var(--muted);margin-top:6px">${data.sample_q_ru}</div>
      </div>

      <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">Полезные фразы:</div>
      ${data.phrases.map(p => `
        <div class="tpl-card">
          <div class="tpl-en">${p.en}</div>
          <div class="tpl-ru">${p.ru}</div>
        </div>
      `).join("")}
    </div>
  `;
}

function renderPractice(el) {
  const prompt = PRACTICE_PROMPTS[practicePromptIdx];
  const topicData = TOPIC_DATA[prompt.topic];
  const wc = countWords(practiceText);
  const status = getWordStatus(wc);

  el.innerHTML = `
    <div class="practice-container">
      <div class="prompt-card">
        <div class="label">Задание — письмо от ${prompt.friend}</div>
        <div class="text">${prompt.text}</div>
        <div class="prompt-actions">
          <button class="prompt-btn" id="showHints">${topicData.icon} Подсказки по теме</button>
          <button class="prompt-btn" id="insertTemplate" title="Вставить шаблон начала">📝 Вставить шаблон</button>
          <button class="prompt-btn" id="clearBtn">🗑 Очистить</button>
        </div>
      </div>

      <div id="hintsArea" style="display:none"></div>

      <div class="editor-area">
        <textarea id="letterArea" placeholder="Начни писать письмо здесь...&#10;&#10;Moscow, Russia&#10;15 March 2025&#10;&#10;Dear ${prompt.friend},&#10;&#10;Thanks for your letter...">${practiceText}</textarea>
        <div class="word-bar">
          <div>
            <div class="word-count-num" style="color:${status.color}">${wc}</div>
            <div class="word-label">слов</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div class="word-indicator" style="background:${status.color}15;color:${status.color}">
              ${status.emoji} ${status.label}
            </div>
            <div class="word-meter">
              <div class="word-meter-fill" style="width:${Math.min(status.pct, 100)}%;background:${status.color}"></div>
            </div>
            <div style="font-size:11px;color:var(--muted)">Цель: 100–120 слов</div>
          </div>
        </div>
      </div>
    </div>
  `;

  const textarea = document.getElementById("letterArea");
  textarea.addEventListener("input", () => {
    practiceText = textarea.value;
    // Update word bar without full re-render
    const wc2 = countWords(practiceText);
    const st2 = getWordStatus(wc2);
    document.querySelector(".word-count-num").textContent = wc2;
    document.querySelector(".word-count-num").style.color = st2.color;
    document.querySelector(".word-indicator").innerHTML = `${st2.emoji} ${st2.label}`;
    document.querySelector(".word-indicator").style.background = `${st2.color}15`;
    document.querySelector(".word-indicator").style.color = st2.color;
    document.querySelector(".word-meter-fill").style.width = `${Math.min(st2.pct, 100)}%`;
    document.querySelector(".word-meter-fill").style.background = st2.color;
  });

  document.getElementById("showHints").addEventListener("click", () => {
    const area = document.getElementById("hintsArea");
    if (area.style.display === "none") {
      area.style.display = "block";
      area.innerHTML = `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:4px">
          <div style="font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:10px">Полезные фразы для этой темы (${topicData.name})</div>
          ${topicData.phrases.map(p => `
            <div style="margin-bottom:6px">
              <span style="font-size:13px;font-weight:600">${p.en}</span>
              <span style="font-size:12px;color:var(--muted);margin-left:6px">— ${p.ru}</span>
            </div>
          `).join("")}
        </div>
      `;
    } else {
      area.style.display = "none";
    }
  });

  document.getElementById("insertTemplate").addEventListener("click", () => {
    const template = `Moscow, Russia\n${new Date().toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'})}\n\nDear ${prompt.friend},\n\nThanks for your letter. It was great to hear from you.\n\n\n\nWell, I have to go now because I need to help my mum. Write back soon!\n\nBest wishes,\n`;
    textarea.value = template;
    practiceText = template;
    textarea.focus();
    textarea.setSelectionRange(template.indexOf("\n\n\n") + 2, template.indexOf("\n\n\n") + 2);
    textarea.dispatchEvent(new Event('input'));
  });

  document.getElementById("clearBtn").addEventListener("click", () => {
    if (practiceText.length > 0 && !confirm("Очистить текст?")) return;
    textarea.value = "";
    practiceText = "";
    textarea.dispatchEvent(new Event('input'));
  });
}

function render() {
  renderModeTabs();
  renderSidebar();
  renderHeader();
  renderContent();
}

render();
</script>
</body>
</html>
